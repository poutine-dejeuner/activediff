defaults:
  - _self_
  - model: unet
  - train: unet
  - inference: unet
  - evaluation: base
  - datamodule: nanophoto
  - callbacks: default
  - trainer: default

debug: false
dtype: float32

data:
  image_shape: [101, 91]

active_learning:
  fom_threshold: 0.48
  distance_threshold: 10
  n_to_generate: 1000
  n_to_generate_debug: 2  # Used when debug=true
  max_iterations: 10
  max_iterations_debug: 2  # Used when debug=true
  resume_training: false
  skip_initial_training: false  # Skip iteration 0 training, load from existing checkpoint
  gen_images_path: data/selected_gen_images.pt # Path to .pt file with pre-selected generated images from a previous run

generation:
  batch_size: 32

fom:
  n_parallel_workers: 8
  skip_meep: false

wandb:
  enabled: true
  project: activediff
  entity: nanophoto
  name: active-diffusion
  tags: []
  notes: null

use_mixed_precision: false
gradient_accumulation_steps: 1
compile_model: false

train:
  n_compute_steps: 5_000_000
  seed: -1
  lr: 0.0001
  num_time_steps: 1000
  ema_decay: 0.9999
  ema_update_every: 1
