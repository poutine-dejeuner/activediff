model_checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  filename: checkpoint
  save_top_k: 1
  monitor: val/loss
  mode: min

generate_image:
  _target_: activediff.callbacks.GenerateImageCallback
  every_n_epochs: 100
  unet_depth: ${datamodule.unet_depth}

binarization_metric:
  _target_: activediff.callbacks.BinarizationMetricCallback
  every_n_epochs: 100
  unet_depth: ${datamodule.unet_depth}

loss_early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: train/loss
  patience: 1000
  mode: min
  min_delta: 0.00001
  verbose: true
  stopping_threshold: 0.0003

binarization_early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: val/bin
  patience: 1000
  mode: min
  min_delta: 0.0001
  verbose: true
  stopping_threshold: 0.003

