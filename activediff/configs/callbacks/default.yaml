model_checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  filename: checkpoint
  save_top_k: 1
  monitor: val/loss
  mode: min

generate_image:
  _target_: activediff.callbacks.GenerateImageCallback
  every_n_epochs: 100

binarization_metric:
  _target_: activediff.callbacks.BinarizationMetricCallback
  every_n_epochs: 100

threshold_stopping:
  _target_: activediff.callbacks.ThresholdStopping
  monitor: val/loss
  threshold: 0.0003
  mode: min
  verbose: true

batch_size_finder:
  _target_: lightning.pytorch.callbacks.BatchSizeFinder
  steps_per_trial: 50
  max_val: 256

