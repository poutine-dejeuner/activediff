# Nanophotonic datamodule configuration
_target_: datamodules.NanophotoDataModule

# Paths (relative to project root)
initial_data_path: data/imagesnorm.npy
output_dir: active_learning_output
output_file: new_images.npy

# DataLoader parameters
batch_size: 32
val_split: 0.1
num_workers: 4

# UNet padding depth (num_layers // 2)
unet_depth: 3

# Data type for model and tensors
dtype: ${dtype}
