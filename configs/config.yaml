defaults:
  - _self_
  - model: unet
  - train: unet
  - inference: unet
  - evaluation: base
  - datamodule: nanophoto

debug: false
dtype: float32

data:
  image_shape: [101, 91]

active_learning:
  fom_threshold: 0.48
  distance_threshold: 10
  n_to_generate: 1000
  max_iterations: 10
  resume_training: true

generation:
  batch_size: 100

fom:
  n_parallel_workers: 8
  skip_meep: false

wandb:
  enabled: true
  project: activediff
  entity: nanophoto
  name: active-diffusion
  tags: []
  notes: null

use_mixed_precision: true
gradient_accumulation_steps: 2
compile_model: true

train:
  n_compute_steps: 5_000_000
  seed: -1
  lr: 0.0001
  num_time_steps: 1000
  ema_decay: 0.9999

trainer:
  accelerator: auto
  devices: 1
  enable_progress_bar: true
  log_every_n_steps: 10
  fast_dev_run: ${debug}

callbacks:
  early_stopping:
    enabled: true
    monitor: val/loss
    patience: 500
    mode: min
    min_delta: 0.00001
  threshold_stopping:
    enabled: true
    monitor: val/loss
    threshold: 0.0003
    mode: min
  generate_image_every_n_epochs: 100
